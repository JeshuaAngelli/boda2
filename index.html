<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Jeshua & Angelli</title>

<link rel="stylesheet" href="style.css">

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
h1,h2,h3 { font-family: 'Playfair Display', serif; }

body.no-scroll {
  overflow: hidden;
}

/* SOBRE FULL */
.scene {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #C2A8AB;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* REVELACIÓN */
#contenido {
  opacity: 0;
  transition: opacity 1.2s ease;
}
#contenido.visible {
  opacity: 1;
}

/* ANIMACIONES */
.animar {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.5s ease;
}
.animar.visible {
  opacity: 1;
  transform: translateY(0);
}

/* PÉTALOS */
.petalo {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  opacity: 0.6;
  animation: caer linear infinite;
}
@keyframes caer {
  100% { transform: translateY(100vh); }
}
</style>

</head>

<body class="no-scroll">

<!-- ========================= -->
<!-- SOBRE CODEPEN -->
<!-- ========================= -->

<div class="scene" id="scene">
  <div class="envelope">

    <div class="layer env-back"></div>

    <div class="layer env-card" id="card">
      <div class="card-content">
        <p class="card-pre olive-text">Save the Date</p>
        <h2 class="card-title olive-text">J & A</h2>
      </div>
    </div>

    <div class="layer flap-wrapper flap-top-wrapper">
      <div class="flap-shape flap-top"></div>
    </div>

    <div class="layer flap-wrapper flap-bottom-wrapper">
      <div class="flap-shape flap-bottom"></div>
    </div>

    <div class="layer flap-wrapper flap-left-wrapper">
      <div class="flap-shape flap-left"></div>
      <div class="monogram-outer gold-text">J & A</div>
    </div>

    <div class="layer flap-wrapper env-flap-main" id="flap">
      <div class="flap-shape flap-right"></div>

      <div class="wax-seal" id="seal"></div>
    </div>

  </div>
</div>

<div class="transition-screen" id="transition-screen"></div>

<!-- ========================= -->
<!-- CONTENIDO REAL -->
<!-- ========================= -->

<div id="contenido">

<nav class="animar">
  <a class="logo-privado">J&A</a>
  <div>
    <a href="#inicio">Inicio</a>
    <a href="#historia">Historia</a>
    <a href="#detalles">Detalles</a>
    <a href="#programa">Programa</a>
    <a href="#ubicacion">Ubicación</a>
  </div>
</nav>

<section id="inicio" class="portada animar">
  <div class="contenedor-portada">

    <img class="foto-lateral foto-izquierda" src="IMG_4879.jpeg">

    <div class="tarjeta-portada">
      <h1>Nos casamos</h1>
      <p class="nombres">Jeshua & Angelli</p>
      <p class="fecha">30 · MAYO · 2026</p>
      <p class="frase-portada">Nos encantaría que formaras parte de este día</p>
    </div>

    <img class="foto-lateral foto-derecha" src="IMG_4882.jpeg">

  </div>
</section>

<section id="historia" class="historia animar">
  <div class="historia-contenido">

    <div class="historia-texto">
      <h2>comienza nuestra historia</h2>
    </div>

    <div class="historia-galeria">
      <button onclick="moverCarrusel(-1)">&#10094;</button>

      <div class="carrusel-fotos" id="carruselFotos">
        <img src="IMG_1.jpg" class="foto-carrusel activa">
        <img src="IMG_2.jpg" class="foto-carrusel">
        <img src="IMG_3.jpg" class="foto-carrusel">
        <img src="IMG_4.jpg" class="foto-carrusel">
        <img src="IMG_5.jpg" class="foto-carrusel">
        <img src="IMG_6.jpg" class="foto-carrusel">
      </div>

      <button onclick="moverCarrusel(1)">&#10095;</button>
    </div>

  </div>
</section>

<section id="detalles" class="detalles animar">
  <h2>Detalles de la Boda</h2>

  <div class="contador-detalles">
    <div><strong id="dias">0</strong></div>
    <div><strong id="horas">0</strong></div>
    <div><strong id="minutos">0</strong></div>
    <div><strong id="segundos">0</strong></div>
  </div>
</section>

<section id="ubicacion" class="ubicacion animar">
  <iframe src="https://www.google.com/maps?q=Salon+Naturafrut+San+Pedro+Tapanatepec+Oaxaca&output=embed"></iframe>
</section>

<footer class="animar">
  <p>JESHUA & ANGELLI</p>
</footer>

</div>

<!-- ========================= -->
<!-- AUDIO -->
<!-- ========================= -->

<audio id="musicaFondo" loop>
  <source src="https://raw.githubusercontent.com/francispain/boda-audio/main/paulyudin-romantic-wedding-piano-160698.mp3">
</audio>

<button onclick="controlarMusica()">♫ Música</button>

<script src="script.js"></script>

<script>
const els = document.querySelectorAll('.animar');
window.addEventListener('scroll', () => {
  els.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight - 50) {
      el.classList.add('visible');
    }
  });
});

for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "petalo";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
