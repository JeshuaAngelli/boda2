<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Jeshua & Angelli</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdfaf6;
  color: #333;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
}

nav a {
  text-decoration: none;
  margin: 0 10px;
  color: #333;
  font-weight: 500;
}

/* PORTADA */
.portada {
  text-align: center;
  padding: 100px 20px;
}

.tarjeta-portada {
  background: white;
  padding: 50px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.nombres {
  font-size: 32px;
  font-weight: bold;
}

.fecha {
  margin: 15px 0;
  letter-spacing: 2px;
}

.boton-portada {
  background: #d4af37;
  padding: 12px 25px;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  display: inline-block;
  margin-top: 10px;
}

/* HISTORIA */
.historia {
  padding: 60px 20px;
  text-align: center;
}

/* CARRUSEL */
.carrusel-fotos img {
  width: 250px;
  border-radius: 15px;
  display: none;
  transition: opacity .5s;
}

.carrusel-fotos img.activa {
  display: inline-block;
}

/* DETALLES */
.detalles {
  text-align: center;
  padding: 60px 20px;
}

.contador-detalles {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.contador-detalles div {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 80px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* BOTÓN MÚSICA */
.boton-musica {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 15px;
  border: none;
  background: #d4af37;
  color: white;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
}
</style>

</head>

<body>

<nav>
  <a href="#">J&A</a>
  <div>
    <a href="#inicio">Inicio</a>
    <a href="#historia">Historia</a>
    <a href="#detalles">Detalles</a>
  </div>
</nav>

<section id="inicio" class="portada">
  <div class="tarjeta-portada">
    <h1>Nos casamos</h1>
    <p class="nombres">Jeshua & Angelli</p>
    <p class="fecha">30 · MAYO · 2026</p>
    <a class="boton-portada" href="#detalles">Ver detalles</a>
  </div>
</section>

<section id="historia" class="historia">
  <h2>Nuestra historia</h2>

  <div class="carrusel-fotos" id="carruselFotos">
    <img src="IMG_5777.PNG" class="activa">
    <img src="IMG_5777.PNG">
    <img src="IMG_5777.PNG">
  </div>

<br><br> <button onclick="moverCarrusel(-1)">⬅</button> <button onclick="moverCarrusel(1)">➡</button>

</section>

<section id="detalles" class="detalles">
  <h2>Cuenta regresiva</h2>

  <div class="contador-detalles">
    <div><strong id="dias">0</strong><br>Días</div>
    <div><strong id="horas">0</strong><br>Horas</div>
    <div><strong id="minutos">0</strong><br>Minutos</div>
    <div><strong id="segundos">0</strong><br>Segundos</div>
  </div>
</section>

<audio id="musicaFondo" loop>
  <source src="https://raw.githubusercontent.com/francispain/boda-audio/main/paulyudin-romantic-wedding-piano-160698.mp3" type="audio/mpeg">
</audio>

<button class="boton-musica" onclick="controlarMusica()">♫</button>

<script>
/* CARRUSEL */
let index = 0;
function moverCarrusel(dir) {
  const fotos = document.querySelectorAll("#carruselFotos img");
  fotos[index].classList.remove("activa");
  index = (index + dir + fotos.length) % fotos.length;
  fotos[index].classList.add("activa");
}

/* CONTADOR */
const fechaBoda = new Date("May 30, 2026 13:00:00").getTime();

setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;

  document.getElementById("dias").innerText = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  document.getElementById("horas").innerText = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
  document.getElementById("minutos").innerText = Math.floor((diferencia / (1000 * 60)) % 60);
  document.getElementById("segundos").innerText = Math.floor((diferencia / 1000) % 60);
}, 1000);

/* MUSICA */
let musica = document.getElementById("musicaFondo");
let reproduciendo = false;

function controlarMusica() {
  if (reproduciendo) {
    musica.pause();
  } else {
    musica.play();
  }
  reproduciendo = !reproduciendo;
}
</script>

</body>
</html>
